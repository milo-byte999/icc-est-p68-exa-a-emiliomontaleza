name: Evaluacion de Pruebas - Ligas

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Ejecutar pruebas y calcular nota
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Instalar Java
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Compilar archivos
        id: compilar
        continue-on-error: true
        run: |
          mkdir -p bin
          if javac -cp "lib/*" -d bin $(find src -name "*.java"); then
            echo "salida=0" >> $GITHUB_ENV
          else
            echo "salida=1" >> $GITHUB_ENV
          fi

      - name: Verificar compilacion
        if: env.salida == '1'
        run: |
          nombre=$(grep '^STUDENT_NAME='    student.env | cut -d '=' -f2 | xargs)
          correo=$(grep '^STUDENT_EMAIL='   student.env | cut -d '=' -f2 | xargs)
          fila=$(grep   '^FILA_ESTUDIANTE=' student.env | cut -d '=' -f2 | xargs)

          USUARIO=$(echo "$correo" | cut -d '@' -f1)
          REPO=$(basename "$GITHUB_REPOSITORY")
          ARCHIVO="$USUARIO-$REPO.txt"

          echo "::warning title=Error de compilacion::El codigo no compilo. Nota final: 0 / 10"
          {
            echo "Estudiante: $nombre"
            echo "Correo: $correo"
            echo "Fila: $fila"
            echo "---"
            echo "Error: No se pudo compilar el codigo"
            echo "Nota final: 0 / 10"
          } > "$ARCHIVO"

          echo "ARCHIVO=$ARCHIVO" >> $GITHUB_ENV

      - name: Ejecutar pruebas
        if: env.salida == '0'
        continue-on-error: true
        run: |
          mkdir -p resultados
          java -jar tools/junit-platform-console-standalone-1.7.0.jar \
                --class-path "bin:lib/*" \
                --select-class "test.LeagueControllerTest" \
                --details tree \
                --disable-ansi-colors \
                --reports-dir resultados/ \
          | tee resultados/salida.txt

      - name: Leer nombre, correo y fila del estudiante
        if: env.salida == '0'
        id: estudiante
        run: |
          nombre=$(grep '^STUDENT_NAME='    student.env | cut -d '=' -f2 | xargs)
          correo=$(grep '^STUDENT_EMAIL='   student.env | cut -d '=' -f2 | xargs)
          fila=$(grep   '^FILA_ESTUDIANTE=' student.env | cut -d '=' -f2 | xargs | tr '[:lower:]' '[:upper:]')
          echo "nombre=$nombre" >> $GITHUB_OUTPUT
          echo "correo=$correo" >> $GITHUB_OUTPUT
          echo "fila=$fila"     >> $GITHUB_OUTPUT

      - name: Calcular nota
        if: env.salida == '0'
        run: |
          NOMBRE="${{ steps.estudiante.outputs.nombre }}"
          CORREO="${{ steps.estudiante.outputs.correo }}"
          FILA="${{ steps.estudiante.outputs.fila }}"

          XML_FILE=$(find resultados -name "TEST-*.xml" 2>/dev/null | head -1)

          TEST1_PASS=false
          TEST2_PASS=false
          TEST3_PASS=false

          if [ -n "$XML_FILE" ]; then
            grep -q 'name="testGetTotalActiveGoals()"'    "$XML_FILE" && \
              ! grep -A5 'name="testGetTotalActiveGoals()"'    "$XML_FILE" | grep -q '<failure' && TEST1_PASS=true
            grep -q 'name="testMetodoOrdenamiento()"'     "$XML_FILE" && \
              ! grep -A5 'name="testMetodoOrdenamiento()"'     "$XML_FILE" | grep -q '<failure' && TEST2_PASS=true
            grep -q 'name="testBusquedaBinariaPorFila()"' "$XML_FILE" && \
              ! grep -A5 'name="testBusquedaBinariaPorFila()"' "$XML_FILE" | grep -q '<failure' && TEST3_PASS=true
          fi

          NOTA=0
          [ "$TEST1_PASS" = "true" ] && NOTA=$((NOTA + 2))
          [ "$TEST2_PASS" = "true" ] && NOTA=$((NOTA + 3))
          [ "$TEST3_PASS" = "true" ] && NOTA=$((NOTA + 3))

          [ "$TEST1_PASS" = "true" ] && T1="[OK] Test 1 - getTotalActiveGoals:    2/2 pts" || T1="[--] Test 1 - getTotalActiveGoals:    0/2 pts"
          [ "$TEST2_PASS" = "true" ] && T2="[OK] Test 2 - Ordenamiento:           3/3 pts" || T2="[--] Test 2 - Ordenamiento:           0/3 pts"
          [ "$TEST3_PASS" = "true" ] && T3="[OK] Test 3 - Busqueda binaria:       3/3 pts" || T3="[--] Test 3 - Busqueda binaria:       0/3 pts"

          USUARIO=$(echo "$CORREO" | cut -d '@' -f1)
          REPO=$(basename "$GITHUB_REPOSITORY")
          ARCHIVO="$USUARIO-$REPO.txt"

          {
            echo "Estudiante: $NOMBRE"
            echo "Correo: $CORREO"
            echo "Fila: $FILA"
            echo "---"
            echo "$T1"
            echo "$T2"
            echo "$T3"
            echo "---"
            echo "Nota final: $NOTA / 8"
          } > "$ARCHIVO"

          echo "ARCHIVO=$ARCHIVO" >> $GITHUB_ENV
          echo "::notice title=Nota Final::$NOMBRE obtuvo $NOTA / 8 (Fila $FILA)"

      - name: Subir resultado
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.ARCHIVO }}
          path: ${{ env.ARCHIVO }}
